<div class="min-h-screen bg-gray-100 p-6">

  <div class="grid md:grid-cols-12 gap-6">

    <!-- LEFT: TABLE (col-7) -->
    <div class="md:col-span-7 bg-white rounded-2xl shadow p-4">

      <h2 class="text-xl font-bold mb-4">📊 Project List</h2>

      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-gray-200 text-left">
            <th class="p-2">Title</th>
            <th class="p-2">Start Date</th>
            <th class="p-2">End Date</th>
            <th class="p-2">Status</th>
          </tr>
        </thead>

        <tbody>
          <!-- Example row -->
          <tr class="border-b hover:bg-gray-100">
            <td class="p-2">AI Chatbot</td>
            <td class="p-2">2026-04-01</td>
            <td class="p-2">2026-04-10</td>
            <td class="p-2 text-green-600 font-semibold">In Progress</td>
          </tr>
        </tbody>
      </table>

    </div>

    <!-- RIGHT: FORM (col-5) -->
    <div class="md:col-span-5 bg-white rounded-2xl shadow p-6">
  
      <h2 class="text-xl font-bold mb-4">➕ Add Project</h2>

      <form class="space-y-4">

        <!-- Title -->
        <div>
          <label class="block text-sm font-medium text-gray-600">Title</label>
          <input type="text"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <!-- Start Date -->
        <div>
          <label class="block text-sm font-medium text-gray-600">Start Date</label>
          <input type="date"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <!-- End Date -->
        <div>
          <label class="block text-sm font-medium text-gray-600">End Date</label>
          <input type="date"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <!-- Description -->
        <div>
          <label class="block text-sm font-medium text-gray-600">Description</label>
          <textarea rows="3"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
        </div>

        <!-- Status -->
        <div>
          <label class="block text-sm font-medium text-gray-600">Status</label>
          <select
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            <option value="">Select status</option>
            <option value="INPROGRESS">In Progress</option>
            <option value="CLOSED">Closed</option>
          </select>
        </div>

        <!-- Button -->
        <button
          class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
          Submit Project
        </button>

      </form>

    </div>

  </div>

</div>
