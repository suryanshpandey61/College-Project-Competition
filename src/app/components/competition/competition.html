<div class="min-h-screen bg-gray-100 p-6">

  <div class="grid md:grid-cols-12 gap-6">

    <!-- LEFT: TABLE (col-8) -->
    <div class="md:col-span-8 bg-white rounded-2xl shadow p-4">

      <h2 class="text-xl font-bold mb-4">📊 Project List</h2>

      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-gray-200 text-left">
            <th class="p-2">S.no</th>
            <th class="p-2">Title</th>
            <th class="p-2">Start Date</th>
            <th class="p-2">End Date</th>
            <th class="p-2">Status</th>
            <th class="p-2 text-center">Actions</th>
          </tr>
        </thead>

        <tbody>
          <!-- Example row -->
           @for (item of competitionList; track $index) {
            <tr class="border-b hover:bg-gray-100">
              <td class="p-2">{{$index+1}}</td>
              <td class="p-2">{{item.title}}</td>
              <td class="p-2">{{item.startDate | date:'dd-MM-yyyy'}}</td>
              <td class="p-2">{{item.endDate | date:'dd-MM-yyyy'}}</td>
              <td class="p-2 text-green-600 font-semibold">{{item.status}}</td>
              <td class="p-2 text-center flex  space-x-2">
                <button tooltip="edit" class="bg-yellow-300 text-white px-1 py-1 rounded hover:bg-yellow-500">
                  ✏️ 
                </button>
                <button (click)="onDelete(item.competitionId)" class="bg-red-400 text-white px-1 py-1 rounded hover:bg-red-600">
                  🗑️
                </button>
              </td>
          </tr>
           }
         
        </tbody>
      </table>

    </div>

    <!-- RIGHT: FORM (col-4) -->
    <div class="md:col-span-4 bg-white rounded-2xl shadow p-6">
  
      <h2 class="text-xl font-bold mb-4">➕ Add Project</h2>

      <form class="space-y-4">

        <!-- Title -->
        <div>
          <label for="title" class="block text-sm font-medium text-gray-600">Title</label>
          <input type="text" [(ngModel)]="newObj.title" name="title"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <!-- Start Date -->
        <div>
          <label for="startDate" class="block text-sm font-medium text-gray-600">Start Date</label>
          <input name="startDate" type="date" [(ngModel)]="newObj.startDate"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <!-- End Date -->
        <div>
          <label for="endDate" class="block text-sm font-medium text-gray-600">End Date</label>
          <input name="endDate" type="date" [(ngModel)]="newObj.endDate"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <!-- Description -->
        <div>
          <label for="description" class="block text-sm font-medium text-gray-600">Description</label>
          <textarea name="description" rows="3" [(ngModel)]="newObj.description"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
        </div>

        <!-- Status -->
        <div>
          <label for="status" class="block text-sm font-medium text-gray-600">Status</label>
          <select name="status" [(ngModel)]="newObj.status"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            <option value="">Select status</option>
            <option value="INPROGRESS">In Progress</option>
            <option value="UPCOMING">Upcoming</option>
            <option value="CLOSED">Closed</option>
          </select>
        </div>

        <!-- Button -->
        <button (click)="onCreateCompetiton()"
          class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
          Submit Project
        </button>

      </form>

    </div>

  </div>

</div>
