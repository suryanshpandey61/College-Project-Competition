<div class="min-h-screen bg-gradient-to-r from-blue-500 to-indigo-500 p-6">

  <div class="grid md:grid-cols-12 gap-6">

    <!-- 🔹 LEFT: FORM -->
    <div class="md:col-span-7 bg-white rounded-2xl shadow p-6">

      <h2 class="text-lg font-bold mb-4 text-gray-700">🚀 Submit Your Project</h2>

      <form class="space-y-4">

        <!-- Project Title -->
        <div>
          <label for="projectTitle" class="text-sm text-gray-600">Project Title</label>
          <input type="text" name="projectTitle" [(ngModel)]="projectObj.projectTitle" name="projectTitle"
            class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
        </div>

        <!-- Description -->
        <div>
          <label class="text-sm text-gray-600">Description</label>
          <textarea rows="3"  name="description"
            class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none"></textarea>
        </div>

        <!-- GitHub Link -->
        <div>
          <label class="text-sm text-gray-600">GitHub Link</label>
          <input type="url"  name="githubLink"
            class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
        </div>

        <!-- Submission Date -->
        <div>
          <label class="text-sm text-gray-600">Submission Date</label>
          <input type="date"  name="submissionDate"
            class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
        </div>

        <!-- Status -->
        <div>
          <label class="text-sm text-gray-600">Status</label>
          <select  name="status"
            class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
            <option value="">Select status</option>
            <option value="SUBMITTED">Submitted</option>
            <option value="UNDERREVIEW">Under Review</option>
            <option value="ACCEPTED">Accepted</option>
            <option value="REJECTED">Rejected</option>
          </select>
        </div>

        <!-- Rank -->
        <div>
          <label class="text-sm text-gray-600">Rank</label>
          <input type="number" name="rank"
            class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
        </div>

        <!-- Submit Button -->
        <button (click)="submitProject()"
          class="w-full bg-gradient-to-r from-indigo-500 to-blue-500 text-white py-2 rounded-lg font-semibold hover:opacity-90 transition">
          Submit Project 🚀
        </button>

      </form>

    </div>

    <!-- 🔹 RIGHT: COMPETITION DETAILS -->
    <div class="md:col-span-5">

      <div class="bg-white rounded-2xl shadow p-5 hover:shadow-lg transition">

        <!-- Title -->
        <h2 class="text-lg font-bold text-gray-800">
          {{ currentCompetitonData?.title }}
        </h2>

        <!-- Description -->
        <p class="text-sm text-gray-500 mt-2">
          {{ currentCompetitonData?.description }}
        </p>

        <!-- Dates -->
        <div class="mt-3 text-sm text-gray-600">
          📅 {{ currentCompetitonData?.startDate | date:'dd MMM yyyy' }}
          <span class="mx-1">→</span>
          {{ currentCompetitonData?.endDate | date:'dd MMM yyyy' }}
        </div>

     
    
      </div>

    </div>

  </div>

</div>
